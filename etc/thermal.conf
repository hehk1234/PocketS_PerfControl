# thermal.conf — trips configurados pelo usuario (sobrescreve auto-trips do modo)
# Valores em milicelsius (50000 = 50.0 graus).
# Vazio = nao mexer (mantem o que o modo ou firmware setou).

# Skin sensor (zone92, skin-msm-therm)
# Range UI: 46500 - 95000   default da OEM: 46500
SKIN_TRIP=

# CPU clusters (cpu-1-* trip_point_2_temp)
# Range UI: 95000 - 108000  default da OEM: 100000
CPU_TRIP=

# GPU clusters (gpuss-* trip_point_1/2_temp)
# Range UI: 90000 - 107000  default da OEM: 95000
GPU_TRIP=
