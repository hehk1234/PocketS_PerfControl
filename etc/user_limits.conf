# user_limits.conf — limites manuais de CPU/GPU (sobrescreve config do modo)
# Vazio = usar valor do modo atual. Valor numerico = forcar esse limite.
# Atualizado via: perfctl limit cpu|gpu <field> <valor>
#
# IMPORTANT: ao mudar de modo, esses limites continuam ativos.
# Para resetar: perfctl limit reset

